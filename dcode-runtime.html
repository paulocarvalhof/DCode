<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DCode Runtime</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d1117;
    color:white;
}

#app{
    padding:20px;
}

button{
    margin:5px;
    padding:8px 14px;
    border:none;
    cursor:pointer;
}

#console{
    background:black;
    padding:10px;
    height:160px;
    overflow:auto;
    margin-top:20px;
    font-family:monospace;
}
</style>
</head>

<body>

<div id="app"></div>

<textarea id="editor" style="width:100%;height:220px;">
<DOCSCRIPT>
 <DCode>

  <DCODEUI>

window Main:
    text title "DCode Runtime"
    button playBtn "Play"
    button saveBtn "Save Score"

  </DCODEUI>

  <DCODESTYLE>

button:
    background #238636
    color white

#title:
    color #58a6ff

  </DCODESTYLE>

  <SCIPTLOGIC>

let score = 10

on playBtn.click:
    print "Game Started"
    score = score + 1

on saveBtn.click:
    savestorage score score
    print "Saved"

  </SCIPTLOGIC>

 </DCode>
</DOCSCRIPT>
</textarea>

<br>
<button onclick="runDCode()">RUN DCODE</button>

<div id="console"></div>

<script>

const app = document.getElementById("app")
const consoleBox = document.getElementById("console")

function print(msg){
    consoleBox.innerHTML += msg + "<br>"
}

function clearConsole(){
    consoleBox.innerHTML = ""
}

function extract(tag, text){
    const start = text.indexOf("<"+tag+">")
    const end = text.indexOf("</"+tag+">")
    if(start===-1 || end===-1) return ""
    return text.substring(start+tag.length+2, end).trim()
}

function runDCode(){
    clearConsole()
    app.innerHTML = ""

    const code = document.getElementById("editor").value

    const ui = extract("DCODEUI", code)
    const style = extract("DCODESTYLE", code)
    const logic = extract("SCIPTLOGIC", code)

    const variables = {}
    const events = {}

    buildUI(ui)
    applyStyle(style)
    runLogic(logic)

    function buildUI(text){
        const lines = text.split("\n")
        for(let raw of lines){
            const line = raw.trim()
            if(line.startsWith("text")){
                const parts = line.split('"')
                const id = line.split(" ")[1]
                const value = parts[1]
                const el = document.createElement("div")
                el.id = id
                el.innerText = value
                app.appendChild(el)
            }

            if(line.startsWith("button")){
                const parts = line.split('"')
                const id = line.split(" ")[1]
                const value = parts[1]
                const el = document.createElement("button")
                el.id = id
                el.innerText = value
                el.onclick = ()=>trigger(id,"click")
                app.appendChild(el)
            }
        }
    }

    function applyStyle(text){
        const lines = text.split("\n")
        let current = null
        for(let raw of lines){
            const line = raw.trim()
            if(line.endsWith(":")){
                current = line.replace(":","")
                continue
            }

            if(!current) continue
            const parts = line.split(" ")
            const prop = parts[0]
            const value = parts[1]

            let elements = []
            if(current.startsWith("#")){
                const el = document.getElementById(current.replace("#",""))
                if(el) elements.push(el)
            }else{
                elements = document.querySelectorAll(current)
            }

            elements.forEach(el=>{
                if(prop==="background") el.style.background=value
                if(prop==="color") el.style.color=value
            })
        }
    }

    function runLogic(text){
        const lines = text.split("\n")
        let currentEvent = null

        for(let raw of lines){
            const line = raw.trim()
            if(line==="") continue

            if(line.startsWith("let ")){
                const parts = line.replace("let ","").split("=")
                const name = parts[0].trim()
                let value = parts[1].trim()
                if(value.startsWith('"')) value=value.replaceAll('"',"")
                else value=Number(value)
                variables[name]=value
                continue
            }

            if(line.startsWith("print ")){
                let v = line.replace("print ","")
                if(variables[v]!==undefined) print(variables[v])
                else print(v.replaceAll('"',""))
                continue
            }

            if(line.startsWith("savestorage")){
                const parts = line.split(" ")
                const key = parts[1]
                const value = variables[parts[2]]
                localStorage.setItem(key,value)
                continue
            }

            if(line.startsWith("loadstorage")){
                const parts = line.split(" ")
                const key = parts[1]
                variables[key]=localStorage.getItem(key)
                continue
            }

            if(line.startsWith("on ")){
                const parts = line.match(/on (.*)\.(.*):/)
                currentEvent = parts[1]+"."+parts[2]
                events[currentEvent] = []
                continue
            }

            if(currentEvent){
                events[currentEvent].push(line)
            }
        }
    }

    function trigger(id,type){
        const key = id+"."+type
        if(!events[key]) return
        events[key].forEach(cmd=>{
            if(cmd.startsWith("print")){
                const v = cmd.replace("print ","")
                if(variables[v]!==undefined) print(variables[v])
                else print(v.replaceAll('"',""))
            }

            if(cmd.includes("=")){
                const parts = cmd.split("=")
                const name = parts[0].trim()
                const value = parts[1].trim()
                if(value.includes("+")){
                    const p=value.split("+")
                    variables[name]=Number(variables[p[0].trim()])+Number(p[1])
                }
            }
        })
    }
}

</script>

</body>
</html>
